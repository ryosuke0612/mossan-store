<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>出欠管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <h3>{{ match[1] }} vs {{ match[2] }}</h3>
    <p>場所: {{ match[3] }}</p>

    <div class="card mb-4 shadow">
        <div class="card-body">
            <h5>出欠登録</h5>
            <form method="POST" action="/attendance/{{ match[0] }}">
                <input type="text" name="name" class="form-control mb-2" placeholder="名前" required>

                <select name="status" class="form-control mb-2">
                    <option value="参加">参加</option>
                    <option value="不参加">不参加</option>
                </select>

                <button class="btn btn-success">登録</button>
            </form>
        </div>
    </div>

    <div class="card shadow">
        <div class="card-body">
            <h5>出欠一覧</h5>
            <ul class="list-group">
                {% for a in attendance %}
                <li class="list-group-item">
                    {{ a[2] }} : {{ a[3] }}
                </li>
                {% endfor %}
            </ul>
        </div>
    </div>

</div>

</body>
</html>
