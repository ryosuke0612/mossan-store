<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>出欠登録 | mossan-store</title>
<meta name="description" content="イベントへの参加可否登録ページ">
<link rel="canonical" href="https://www.mossan-store.com/attendance">
</head>
<body>

<h2>出欠登録</h2>

<form method="post">
  <select name="name" required>
    {% for member in members %}
      <option value="{{ member }}">{{ member }}</option>
    {% endfor %}
  </select>

  <select name="match_id">
    {% for match in matches %}
      <option value="{{ match[0] }}">
        {{ match[1] }} vs {{ match[2] }} ({{ match[3] }})
      </option>
    {% endfor %}
  </select>

  <button name="status" value="参加">参加</button>
  <button name="status" value="不参加">不参加</button>
</form>

<hr>
<a href="/">← 戻る</a>

</body>
</html>
