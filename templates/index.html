<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Soccer Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-success">
    <div class="container-fluid">
        <span class="navbar-brand">⚽ Soccer Team Manager</span>
    </div>
</nav>

<div class="container mt-4">

    <div class="card mb-4 shadow">
        <div class="card-body">
            <h5>試合を登録</h5>
            <form action="/add" method="POST">
                <div class="mb-2">
                    <input type="date" name="date" class="form-control" required>
                </div>
                <div class="mb-2">
                    <input type="text" name="opponent" class="form-control" placeholder="対戦相手" required>
                </div>
                <div class="mb-2">
                    <input type="text" name="location" class="form-control" placeholder="場所" required>
                </div>
                <button class="btn btn-success">登録</button>
            </form>
        </div>
    </div>

    <div class="card shadow">
        <div class="card-body">
            <h5>試合一覧</h5>
            <ul class="list-group">
                {% for match in matches %}
                <li class="list-group-item">
                    <a href="/match/{{ match[0] }}">
                        {{ match[1] }} vs {{ match[2] }} ({{ match[3] }})
                    </a>
                </li>
                {% endfor %}
            </ul>
        </div>
    </div>

</div>

</body>
</html>
