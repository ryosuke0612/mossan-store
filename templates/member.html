<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>出欠登録</title>
</head>
<body>
    <h2>{{ member.name }} さんの出欠登録</h2>

    {% for event in events %}
        <div style="margin-bottom:20px;">
            <strong>{{ event.title }}</strong> - {{ event.date }}

            <form method="post" action="/attend/{{ event.id }}/{{ member.token }}">
                <button name="status" value="参加">参加</button>
                <button name="status" value="不参加">不参加</button>
            </form>
        </div>
    {% endfor %}

    <a href="/">← 管理画面へ</a>
</body>
</html>
