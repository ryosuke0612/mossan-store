<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Mossan Store{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --bg-soft: #171717;
  --line: #ff2b2b;
  --line-soft: rgba(255, 43, 43, 0.25);
  --text: #f5f5f5;
  --muted: #b8b8b8;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  background: radial-gradient(circle at 10% 0%, #290000 0%, var(--bg) 45%);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  padding-top: 82px;
  padding-bottom: 68px;
}
a { color: inherit; }
.site-header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  z-index: 20;
  background: rgba(0, 0, 0, 0.92);
  border-bottom: 3px solid var(--line);
  backdrop-filter: blur(4px);
}
.header-inner {
  width: min(1120px, 92%);
  margin: 0 auto;
  padding: 14px 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 14px;
  position: relative;
}
.logo-area {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}
.logo-area img { width: 44px; height: 44px; object-fit: contain; }
.logo-text {
  font-family: 'Anton', sans-serif;
  font-size: 28px;
  letter-spacing: 2px;
}
.top-nav {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  align-items: center;
}
.top-nav a {
  text-decoration: none;
  font-weight: 700;
  color: var(--text);
  border-bottom: 2px solid transparent;
  padding-bottom: 2px;
}
.top-nav a:hover { color: #ff8a8a; border-bottom-color: #ff8a8a; }
.menu-toggle {
  display: none;
  width: 42px;
  height: 42px;
  padding: 0;
  border: 1px solid #3a3a3a;
  border-radius: 10px;
  background: #111;
  cursor: pointer;
  align-items: center;
  justify-content: center;
  gap: 5px;
  flex-direction: column;
}
.menu-toggle span {
  width: 18px;
  height: 2px;
  border-radius: 999px;
  background: #f5f5f5;
}
.user-chip {
  color: var(--muted);
  font-size: 14px;
  margin-right: 6px;
}
.page-wrap {
  width: min(1120px, 92%);
  margin: 34px auto 70px;
}
.page-title {
  font-family: 'Anton', sans-serif;
  letter-spacing: 1px;
  font-size: clamp(30px, 5vw, 48px);
  margin: 0 0 20px;
}
.panel {
  background: linear-gradient(180deg, #1a1a1a 0%, #131313 100%);
  border: 1px solid var(--line-soft);
  border-radius: 14px;
  padding: 18px;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
}
.panel + .panel { margin-top: 16px; }
.grid-2 {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 16px;
}
.grid-3 {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 16px;
}
.field { margin-bottom: 14px; }
label {
  display: block;
  margin-bottom: 6px;
  font-size: 14px;
  color: var(--muted);
}
input, select, button {
  width: 100%;
  border-radius: 10px;
  border: 1px solid #2d2d2d;
  background: #0d0d0d;
  color: var(--text);
  padding: 10px 12px;
  font-size: 15px;
}
input:focus, select:focus {
  outline: none;
  border-color: #ff7878;
  box-shadow: 0 0 0 2px rgba(255, 43, 43, 0.25);
}
.btn-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.btn {
  width: auto;
  display: inline-block;
  text-decoration: none;
  border: 1px solid #ff4b4b;
  background: #ff2b2b;
  color: white;
  font-weight: 700;
  padding: 10px 16px;
  border-radius: 999px;
  cursor: pointer;
}
.btn:hover { background: #ff5353; }
.btn.secondary { background: transparent; border-color: #666; }
.btn.secondary:hover { border-color: #999; }
.btn.warning { background: #c77900; border-color: #c77900; }
.btn.danger { background: #a22626; border-color: #a22626; }
.notice {
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid;
  margin-bottom: 12px;
}
.notice.error { background: rgba(180, 35, 35, 0.2); border-color: #c53f3f; }
.notice.success { background: rgba(41, 146, 73, 0.2); border-color: #2f9a50; }
.table-wrap { overflow-x: auto; }
table {
  width: 100%;
  border-collapse: collapse;
  min-width: 760px;
}
th, td {
  border: 1px solid #2f2f2f;
  padding: 8px;
  font-size: 14px;
  vertical-align: middle;
  text-align: center;
}
th { background: #1b1b1b; color: #ffcbcb; }
.site-footer {
  position: fixed;
  left: 0;
  bottom: 0;
  width: 100%;
  z-index: 20;
  border-top: 3px solid var(--line);
  background: #000;
  text-align: center;
  color: #bdbdbd;
  padding: 22px;
  font-size: 13px;
}
@media (max-width: 900px) {
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
  .header-inner {
    align-items: center;
  }
  .logo-text {
    font-size: 22px;
    letter-spacing: 1px;
  }
  .menu-toggle {
    display: inline-flex;
    position: absolute;
    top: 50%;
    right: 0;
    transform: translateY(-50%);
  }
  .top-nav {
    display: none;
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    width: min(260px, 86vw);
    padding: 12px;
    background: #0d0d0d;
    border: 1px solid #333;
    border-radius: 12px;
    box-shadow: 0 12px 28px rgba(0, 0, 0, 0.45);
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
  }
  .top-nav.open {
    display: flex;
  }
  .top-nav a {
    width: 100%;
    border-bottom: none;
    padding: 6px 2px;
  }
  body { padding-top: 88px; padding-bottom: 68px; }
}
</style>
{% block head_extra %}{% endblock %}
</head>
<body>
<header class="site-header">
  <div class="header-inner">
    <a class="logo-area" href="/">
      <img src="{{ url_for('static', filename='images/gorilla-logo.png') }}" alt="logo">
      <span class="logo-text">MOSSAN STORE</span>
    </a>
    <button type="button" class="menu-toggle" aria-label="メニュー" aria-expanded="false" aria-controls="top-nav">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <nav class="top-nav" id="top-nav">
      <a href="/">ホーム</a>
      <a href="/app">イベント管理</a>
      <a href="/team">チームページ</a>
      <a href="/payment">決済</a>
      {% if session.get('user_id') %}
      <a href="/logout">ログアウト</a>
      {% else %}
      <a href="/login">ログイン</a>
      <a href="/register">新規登録</a>
      {% endif %}
    </nav>
  </div>
</header>
<main class="page-wrap">
{% block content %}{% endblock %}
</main>
<footer class="site-footer">&copy; 2026 Mossan Store All Rights Reserved.</footer>
<script>
(() => {
  const toggle = document.querySelector('.menu-toggle');
  const nav = document.getElementById('top-nav');
  if (!toggle || !nav) return;

  const closeNav = () => {
    nav.classList.remove('open');
    toggle.setAttribute('aria-expanded', 'false');
  };

  toggle.addEventListener('click', () => {
    const isOpen = nav.classList.toggle('open');
    toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
  });

  nav.querySelectorAll('a').forEach((link) => {
    link.addEventListener('click', closeNav);
  });

  window.addEventListener('resize', () => {
    if (window.innerWidth > 900) closeNav();
  });
})();
</script>
{% block scripts %}{% endblock %}
</body>
</html>
