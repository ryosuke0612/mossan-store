<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>イベント編集</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container py-4">

<h3>イベント編集</h3>

<div class="card shadow-sm">
<div class="card-body">

<form method="POST" action="/update/{{ match[0] }}">
<div class="mb-3">
<label>日付</label>
<input type="date" name="date" value="{{ match[1] }}" class="form-control" required>
</div>

<div class="mb-3">
<label>開始時間</label>
<input type="time" name="start_time" value="{{ match[2] }}" class="form-control" required>
</div>

<div class="mb-3">
<label>終了時間</label>
<input type="time" name="end_time" value="{{ match[3] }}" class="form-control" required>
</div>

<div class="mb-3">
<label>対戦相手</label>
<input type="text" name="opponent" value="{{ match[4] }}" class="form-control" required>
</div>

<div class="mb-3">
<label>場所</label>
<input type="text" name="place" value="{{ match[5] }}" class="form-control" required>
</div>

<button class="btn btn-success">更新</button>
<a href="/" class="btn btn-secondary">戻る</a>

</form>

</div>
</div>

</div>
</body>
</html>
