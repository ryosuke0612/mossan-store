{% extends "attendance_base.html" %}

{% block title %}イベント管理 | Mossan Store{% endblock %}

<section class="panel" style="max-width: 860px;">

    ここは管理者用のイベント管理ページです。次の段階でイベント作成、編集、出欠一覧確認を追加します。
  </p>
  <div class="grid-2">
    <div>
      <label>ログイン中の管理者</label>
      <div>{{ admin_email }}</div>

    <div>
      <label>現在の状態</label>

  <div class="btn-row" style="margin-top: 18px;">

  </div>

{% endblock %}
