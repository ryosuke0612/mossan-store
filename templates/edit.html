<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>イベント編集</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container py-4">

<h3 class="mb-4">イベント編集</h3>

<div class="card shadow-sm">
<div class="card-body">

<form method="POST">

<div class="row mb-3">
<label class="col-sm-2 col-form-label">日付</label>
<div class="col-sm-4">
<input type="date" name="date" class="form-control"
       value="{{ match['date'] }}" required>
</div>
</div>

<div class="row mb-3">
<label class="col-sm-2 col-form-label">開始時間</label>
<div class="col-sm-4">
<input type="time" name="start_time" class="form-control"
       value="{{ match['start_time'] }}" required>
</div>
</div>

<div class="row mb-3">
<label class="col-sm-2 col-form-label">終了時間</label>
<div class="col-sm-4">
<input type="time" name="end_time" class="form-control"
       value="{{ match['end_time'] }}" required>
</div>
</div>

<div class="row mb-3">
<label class="col-sm-2 col-form-label">対戦相手</label>
<div class="col-sm-6">
<input type="text" name="opponent" class="form-control"
       value="{{ match['opponent'] }}" required>
</div>
</div>

<div class="row mb-4">
<label class="col-sm-2 col-form-label">場所</label>
<div class="col-sm-6">
<input type="text" name="place" class="form-control"
       value="{{ match['place'] }}" required>
</div>
</div>

<div class="d-flex justify-content-between">
<a href="/" class="btn btn-secondary">戻る</a>
<button class="btn btn-primary">更新する</button>
</div>

</form>

</div>
</div>

</div>
</body>
</html>
