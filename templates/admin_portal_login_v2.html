{% extends "admin_base_clean.html" %}

{% block title %}管理者ログイン | Mossan Store{% endblock %}

{% block head_extra %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Reggae+One&display=swap" rel="stylesheet">
<style>
.dashboard-reggae-title {
  font-family: 'Reggae One', 'Noto Sans JP', sans-serif;
  letter-spacing: 0.04em;
  color: #ead7b3;
}
.fancy-admin-btn {
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 170px;
  min-height: 41px;
  padding: 10px 14px;
  border-radius: 4px;
  border: 1px solid #4a4f55;
  color: #eef2f6;
  font-weight: 800;
  letter-spacing: 0.04em;
  text-decoration: none;
  text-shadow: 0 1px 0 rgba(0, 0, 0, 0.45);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12), 0 5px 12px rgba(0, 0, 0, 0.32);
  background:
    repeating-linear-gradient(
      135deg,
      rgba(255, 255, 255, 0.05) 0 3px,
      rgba(0, 0, 0, 0.08) 3px 6px
    ),
    linear-gradient(180deg, #5f666e 0%, #3d434a 100%);
  transition: transform 0.16s ease, box-shadow 0.16s ease, filter 0.16s ease;
}
.fancy-admin-btn.maroon {
  border-color: #8a1f35;
  color: #fff0f3;
  background:
    repeating-linear-gradient(
      135deg,
      rgba(255, 255, 255, 0.06) 0 3px,
      rgba(0, 0, 0, 0.08) 3px 6px
    ),
    linear-gradient(180deg, #b12b4b 0%, #7b1e35 100%);
}
.fancy-admin-btn::before,
.fancy-admin-btn::after {
  content: "";
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 6px;
  height: 6px;
  border-radius: 999px;
  background: rgba(22, 24, 27, 0.8);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2);
}
.fancy-admin-btn::before {
  left: 8px;
}
.fancy-admin-btn::after {
  right: 8px;
}
.fancy-admin-btn:hover {
  filter: brightness(1.06) contrast(1.04);
}
.fancy-admin-btn:active {
  transform: translateY(0);
}
.btn-row {
  justify-content: flex-start;
}
.login-submit-btn {
  width: auto;
  min-width: 0;
}
</style>
{% endblock %}

{% block content %}
<h1 class="page-title dashboard-reggae-title">管理者ログイン</h1>

<section class="panel" style="max-width: 720px;">
  {% if error_message %}
  <div class="notice error">{{ error_message }}</div>
  {% endif %}
  {% if info_message %}
  <div class="notice success">{{ info_message }}</div>
  {% endif %}

  <form method="POST" action="{{ url_for('admin_login_entry') }}">
    <input type="hidden" name="next" value="{{ next_url }}">
    <div class="field">
      <label for="admin-email">メールアドレス</label>
      <input id="admin-email" type="email" name="email" placeholder="admin@example.com" required>
    </div>
    <div class="field">
      <label for="admin-password">パスワード</label>
      <input id="admin-password" type="password" name="password" placeholder="8文字以上" required minlength="8">
    </div>
    <div class="btn-row">
      <button class="btn fancy-admin-btn maroon login-submit-btn" type="submit">管理者としてログイン</button>
    </div>
  </form>
</section>
{% endblock %}
