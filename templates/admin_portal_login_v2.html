{% extends "admin_base_clean.html" %}

{% block title %}管理者ログイン | Mossan Store{% endblock %}

{% block content %}
<h1 class="page-title">管理者ログイン</h1>

<section class="panel" style="max-width: 720px;">
  {% if error_message %}
  <div class="notice error">{{ error_message }}</div>
  {% endif %}
  {% if info_message %}
  <div class="notice success">{{ info_message }}</div>
  {% endif %}

  <form method="POST" action="{{ url_for('admin_login_entry') }}">
    <input type="hidden" name="next" value="{{ next_url }}">
    <div class="field">
      <label for="admin-email">メールアドレス</label>
      <input id="admin-email" type="email" name="email" placeholder="admin@example.com" required>
    </div>
    <div class="field">
      <label for="admin-password">パスワード</label>
      <input id="admin-password" type="password" name="password" placeholder="8文字以上" required minlength="8">
    </div>
    <div class="btn-row">
      <button class="btn" type="submit">管理者画面へログイン</button>
      <a class="btn secondary" href="{{ url_for('attendance_description') }}">アプリ説明へ</a>
    </div>
  </form>
</section>
{% endblock %}
