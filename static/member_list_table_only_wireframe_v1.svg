  <text x="336" y="1004" class="body text">在籍中</text>
  <text x="474" y="1004" class="body text">91%</text>
  <text x="592" y="1004" class="body good">0円</text>
  <text x="722" y="1004" class="body text">0件</text>
  <text x="844" y="1004" class="body text">3/24</text>
  <text x="986" y="1004" class="body good">問題なし</text>
  <text x="1212" y="1004" class="small text">主力</text>

  <text x="130" y="1098" class="body text">山田 海</text>
  <text x="336" y="1098" class="body text">在籍中</text>
  <text x="474" y="1098" class="body text">95%</text>
  <text x="592" y="1098" class="body good">0円</text>
  <text x="722" y="1098" class="body text">0件</text>
  <text x="844" y="1098" class="body text">3/26</text>
  <text x="986" y="1098" class="body good">安定参加</text>
  <text x="1212" y="1098" class="small text">優先不要</text>

  <text x="130" y="1192" class="body text">伊藤 凛</text>
  <text x="336" y="1192" class="body text">休会</text>
  <text x="474" y="1192" class="body text">12%</text>
  <text x="592" y="1192" class="body good">0円</text>
  <text x="722" y="1192" class="body text">0件</text>
  <text x="844" y="1192" class="body text">12/10</text>
