  <text x="336" y="722" class="body text">在籍中</text>
  <text x="474" y="722" class="body text">51%</text>
  <text x="592" y="722" class="body good">0円</text>
  <text x="722" y="722" class="body text">0件</text>
  <text x="844" y="722" class="body text">3/20</text>
  <text x="986" y="722" class="body text">参加率低下</text>
  <text x="1212" y="722" class="small text">最近少なめ</text>

  <text x="130" y="816" class="body text">佐藤 颯</text>
  <text x="336" y="816" class="body text">在籍中</text>
  <text x="474" y="816" class="body text">77%</text>
  <text x="592" y="816" class="body good">0円</text>
  <text x="722" y="816" class="body text">2件</text>
  <text x="844" y="816" class="body text">3/23</text>
  <text x="986" y="816" class="body text">返信が遅い傾向</text>
  <text x="1212" y="816" class="small text">様子見</text>

  <text x="130" y="910" class="body text">高橋 遼</text>
  <text x="336" y="910" class="body text">在籍中</text>
  <text x="474" y="910" class="body text">33%</text>
  <text x="592" y="910" class="body good">0円</text>
  <text x="722" y="910" class="body text">1件</text>
  <text x="844" y="910" class="body text">1/28</text>
  <text x="986" y="910" class="body text">今月未参加</text>
  <text x="1212" y="910" class="small text">確認推奨</text>

