  <text x="130" y="1286" class="body text">加藤 蓮</text>
  <text x="336" y="1286" class="body text">在籍中</text>
  <text x="474" y="1286" class="body text">73%</text>
  <text x="592" y="1286" class="body good">0円</text>
  <text x="722" y="1286" class="body text">1件</text>
  <text x="844" y="1286" class="body text">3/18</text>
  <text x="986" y="1286" class="body text">回答やや遅め</text>
  <text x="1212" y="1286" class="small text">通常</text>

  <text x="130" y="1380" class="body text">井上 陽</text>
  <text x="336" y="1380" class="body text">在籍中</text>
  <text x="474" y="1380" class="body text">64%</text>
  <text x="592" y="1380" class="body warn">2,000円</text>
  <text x="722" y="1380" class="body text">0件</text>
  <text x="844" y="1380" class="body text">3/15</text>
  <text x="986" y="1380" class="body text">一部未払い</text>
