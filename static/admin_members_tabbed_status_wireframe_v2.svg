<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1280" viewBox="0 0 1800 1280" role="img" aria-labelledby="title desc">
  <title id="title">メンバー管理画面 タブ統合UIモック v2</title>
  <desc id="desc">メンバー管理画面のメンバー一覧表に、出欠登録状況、配車登録状況、集金状況の3つのタブと期間指定フィルタを組み込んだ統合UI案です。</desc>
  <defs>
    <style>
      .bg { fill: #0b0f14; }
      .panel { fill: #121821; stroke: #2f3946; stroke-width: 2; rx: 18; ry: 18; }
      .subpanel { fill: #0f141c; stroke: #27313c; stroke-width: 1.5; rx: 14; ry: 14; }
      .card { fill: #151c25; stroke: #2a3441; stroke-width: 1.5; rx: 16; ry: 16; }
      .input { fill: #11151b; stroke: #364252; stroke-width: 1.4; rx: 10; ry: 10; }
      .tab-active { fill: #2f7a4f; stroke: #40a769; stroke-width: 1.5; rx: 999; ry: 999; }
      .tab { fill: #1b2430; stroke: #334153; stroke-width: 1.5; rx: 999; ry: 999; }
      .btn-primary { fill: #8f2940; stroke: #b64863; stroke-width: 1.5; rx: 10; ry: 10; }
      .btn-secondary { fill: #1c2631; stroke: #425164; stroke-width: 1.5; rx: 10; ry: 10; }
      .table-head { fill: url(#headGrad); stroke: #2f6d44; stroke-width: 1.2; }
      .table-cell { fill: #11151b; stroke: #2f3946; stroke-width: 1; }
      .table-cell-alt { fill: #16202a; stroke: #2f3946; stroke-width: 1; }
      .chip-good { fill: #183828; stroke: #2b6a48; stroke-width: 1; rx: 10; ry: 10; }
      .chip-warn { fill: #3b2d15; stroke: #7f6025; stroke-width: 1; rx: 10; ry: 10; }
      .chip-bad { fill: #3e1f24; stroke: #87505c; stroke-width: 1; rx: 10; ry: 10; }
      .text { fill: #e5e7eb; font-family: 'Noto Sans JP', 'Yu Gothic', sans-serif; }
      .muted { fill: #9aa4b2; font-family: 'Noto Sans JP', 'Yu Gothic', sans-serif; }
      .strong { fill: #ffffff; font-family: 'Noto Sans JP', 'Yu Gothic', sans-serif; font-weight: 700; }
      .accent { fill: #e8fff0; font-family: 'Noto Sans JP', 'Yu Gothic', sans-serif; font-weight: 700; }
      .title { font-size: 34px; font-weight: 700; }
      .h1 { font-size: 28px; font-weight: 700; }
      .h2 { font-size: 20px; font-weight: 700; }
      .body { font-size: 15px; font-weight: 500; }
      .small { font-size: 13px; font-weight: 500; }
      .tiny { font-size: 12px; font-weight: 500; }
      .num { font-size: 24px; font-weight: 700; }
    </style>
    <linearGradient id="headGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#3b8f5f"/>
      <stop offset="100%" stop-color="#2a6d48"/>
    </linearGradient>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1280" />

  <text x="48" y="58" class="text title">メンバー管理画面 タブ統合UIモック</text>
  <text x="48" y="94" class="muted body">メンバー一覧を土台にして、出欠・配車・集金をタブで切り替える構成</text>

  <rect class="panel" x="34" y="124" width="1732" height="1120" />

  <text x="64" y="174" class="strong h1">メンバー管理</text>
  <text x="64" y="204" class="muted small">同じメンバー一覧のまま、確認したい状況だけを切り替えて見る</text>

  <rect class="btn-primary" x="1498" y="154" width="124" height="42" />
  <text x="1534" y="181" class="strong body">一括登録</text>
  <rect class="btn-secondary" x="1634" y="154" width="98" height="42" />
  <text x="1668" y="181" class="text body">戻る</text>

  <rect class="card" x="64" y="232" width="1668" height="134" />
  <text x="88" y="266" class="strong h2">共通フィルタ</text>
  <text x="88" y="292" class="muted small">登録時期が異なるメンバーに合わせて、分析対象期間を指定する</text>

  <text x="88" y="324" class="muted small">期間プリセット</text>
  <rect class="input" x="88" y="336" width="178" height="38" />
  <text x="124" y="360" class="text body">直近3か月</text>

  <text x="288" y="324" class="muted small">開始日</text>
  <rect class="input" x="288" y="336" width="150" height="38" />
  <text x="320" y="360" class="text body">2026-01-01</text>

  <text x="460" y="324" class="muted small">終了日</text>
  <rect class="input" x="460" y="336" width="150" height="38" />
  <text x="492" y="360" class="text body">2026-03-31</text>

  <text x="632" y="324" class="muted small">表示対象</text>
  <rect class="input" x="632" y="336" width="158" height="38" />
  <text x="668" y="360" class="text body">有効メンバーのみ</text>

  <text x="812" y="324" class="muted small">絞り込み</text>
  <rect class="input" x="812" y="336" width="148" height="38" />
  <text x="852" y="360" class="text body">要対応のみ</text>

  <text x="982" y="324" class="muted small">ルール</text>
  <rect class="input" x="982" y="336" width="334" height="38" />
  <text x="1006" y="360" class="text body">登録前イベントは分母に含めない</text>

  <rect class="btn-secondary" x="1496" y="334" width="104" height="40" />
  <text x="1532" y="360" class="text body">条件保存</text>
  <rect class="btn-primary" x="1612" y="334" width="96" height="40" />
  <text x="1644" y="360" class="strong body">更新</text>

  <rect class="card" x="64" y="392" width="1668" height="112" />
  <text x="88" y="426" class="strong h2">上部サマリー</text>
  <text x="88" y="452" class="muted small">タブが変わっても、今見ている期間の全体感は共通で把握できる</text>

  <rect class="subpanel" x="88" y="468" width="250" height="24" />
  <rect class="subpanel" x="362" y="468" width="250" height="24" />
  <rect class="subpanel" x="636" y="468" width="250" height="24" />
  <rect class="subpanel" x="910" y="468" width="250" height="24" />
  <text x="98" y="485" class="muted tiny">対象メンバー 24名</text>
  <text x="372" y="485" class="muted tiny">対象イベント 10件</text>
  <text x="646" y="485" class="muted tiny">未回答メンバー 3名</text>
  <text x="920" y="485" class="muted tiny">未回収額 12,000円</text>

  <rect class="tab-active" x="64" y="532" width="160" height="44" />
  <text x="114" y="560" class="accent body">出欠登録状況</text>
  <rect class="tab" x="236" y="532" width="160" height="44" />
  <text x="290" y="560" class="text body">配車登録状況</text>
  <rect class="tab" x="408" y="532" width="160" height="44" />
  <text x="462" y="560" class="text body">集金状況</text>

  <text x="592" y="560" class="muted small">タブ切り替えで表の列だけを差し替えるため、一覧の使い方は変わらない</text>

  <rect class="panel" x="64" y="598" width="1668" height="584" />
  <text x="88" y="638" class="strong h2">表示例: 出欠登録状況タブ</text>
  <text x="88" y="664" class="muted small">率だけではなく、母数も一緒に表示して判断しやすくする</text>

  <rect class="table-head" x="88" y="692" width="70" height="56" />
  <rect class="table-head" x="158" y="692" width="220" height="56" />
  <rect class="table-head" x="378" y="692" width="120" height="56" />
  <rect class="table-head" x="498" y="692" width="132" height="56" />
  <rect class="table-head" x="630" y="692" width="132" height="56" />
  <rect class="table-head" x="762" y="692" width="132" height="56" />
  <rect class="table-head" x="894" y="692" width="174" height="56" />
  <rect class="table-head" x="1068" y="692" width="182" height="56" />
  <rect class="table-head" x="1250" y="692" width="210" height="56" />
  <rect class="table-head" x="1460" y="692" width="248" height="56" />
  <text x="112" y="726" class="accent small">選択</text>
  <text x="234" y="726" class="accent small">メンバー名</text>
  <text x="420" y="726" class="accent small">状態</text>
  <text x="536" y="726" class="accent small">参加回数</text>
  <text x="668" y="726" class="accent small">不参加回数</text>
  <text x="800" y="726" class="accent small">未回答回数</text>
  <text x="950" y="726" class="accent small">回答率</text>
  <text x="1130" y="726" class="accent small">最終回答日</text>
  <text x="1322" y="726" class="accent small">要対応メモ</text>
  <text x="1550" y="726" class="accent small">操作</text>

  <rect class="table-cell-alt" x="88" y="748" width="70" height="82" />
  <rect class="table-cell-alt" x="158" y="748" width="220" height="82" />
  <rect class="table-cell-alt" x="378" y="748" width="120" height="82" />
  <rect class="table-cell-alt" x="498" y="748" width="132" height="82" />
  <rect class="table-cell-alt" x="630" y="748" width="132" height="82" />
  <rect class="table-cell-alt" x="762" y="748" width="132" height="82" />
  <rect class="table-cell-alt" x="894" y="748" width="174" height="82" />
  <rect class="table-cell-alt" x="1068" y="748" width="182" height="82" />
  <rect class="table-cell-alt" x="1250" y="748" width="210" height="82" />
  <rect class="table-cell-alt" x="1460" y="748" width="248" height="82" />
  <rect class="table-cell" x="115" y="780" width="18" height="18" />
  <text x="182" y="782" class="strong body">田中 太郎</text>
  <text x="182" y="806" class="muted small">登録日 2025-09-12</text>
  <rect class="chip-good" x="404" y="770" width="68" height="28" />
  <text x="428" y="789" class="text small">安定</text>
  <text x="552" y="790" class="strong body">9</text>
  <text x="579" y="790" class="muted small">/10</text>
  <text x="684" y="790" class="text body">1</text>
  <text x="816" y="790" class="text body">0</text>
  <text x="958" y="790" class="strong body">100%</text>
  <text x="1124" y="790" class="text body">2026-03-26</text>
  <text x="1274" y="790" class="muted small">特になし</text>
  <rect class="btn-secondary" x="1494" y="770" width="78" height="30" />
  <text x="1517" y="790" class="text tiny">並替</text>
  <rect class="btn-secondary" x="1582" y="770" width="78" height="30" />
  <text x="1605" y="790" class="text tiny">詳細</text>

  <rect class="table-cell" x="88" y="830" width="70" height="82" />
  <rect class="table-cell" x="158" y="830" width="220" height="82" />
  <rect class="table-cell" x="378" y="830" width="120" height="82" />
  <rect class="table-cell" x="498" y="830" width="132" height="82" />
  <rect class="table-cell" x="630" y="830" width="132" height="82" />
  <rect class="table-cell" x="762" y="830" width="132" height="82" />
  <rect class="table-cell" x="894" y="830" width="174" height="82" />
  <rect class="table-cell" x="1068" y="830" width="182" height="82" />
  <rect class="table-cell" x="1250" y="830" width="210" height="82" />
  <rect class="table-cell" x="1460" y="830" width="248" height="82" />
  <rect class="table-cell" x="115" y="862" width="18" height="18" />
  <text x="182" y="864" class="strong body">佐藤 花子</text>
  <text x="182" y="888" class="muted small">登録日 2026-02-10</text>
  <rect class="chip-bad" x="404" y="852" width="68" height="28" />
  <text x="422" y="871" class="text small">要確認</text>
  <text x="546" y="872" class="strong body">2</text>
  <text x="572" y="872" class="muted small">/5</text>
  <text x="684" y="872" class="text body">1</text>
  <text x="810" y="872" class="text body">2</text>
  <text x="958" y="872" class="strong body">60%</text>
  <text x="1124" y="872" class="text body">2026-03-12</text>
  <text x="1274" y="872" class="muted small">未回答が続いている</text>
  <rect class="btn-primary" x="1490" y="852" width="84" height="30" />
  <text x="1513" y="872" class="strong tiny">連絡候補</text>
  <rect class="btn-secondary" x="1582" y="852" width="78" height="30" />
  <text x="1605" y="872" class="text tiny">詳細</text>

  <rect class="table-cell-alt" x="88" y="912" width="70" height="82" />
  <rect class="table-cell-alt" x="158" y="912" width="220" height="82" />
  <rect class="table-cell-alt" x="378" y="912" width="120" height="82" />
  <rect class="table-cell-alt" x="498" y="912" width="132" height="82" />
  <rect class="table-cell-alt" x="630" y="912" width="132" height="82" />
  <rect class="table-cell-alt" x="762" y="912" width="132" height="82" />
  <rect class="table-cell-alt" x="894" y="912" width="174" height="82" />
  <rect class="table-cell-alt" x="1068" y="912" width="182" height="82" />
  <rect class="table-cell-alt" x="1250" y="912" width="210" height="82" />
  <rect class="table-cell-alt" x="1460" y="912" width="248" height="82" />
  <rect class="table-cell" x="115" y="944" width="18" height="18" />
  <text x="182" y="946" class="strong body">中村 光</text>
  <text x="182" y="970" class="muted small">登録日 2024-11-04</text>
  <rect class="chip-warn" x="404" y="934" width="68" height="28" />
  <text x="430" y="953" class="text small">注意</text>
  <text x="546" y="954" class="strong body">6</text>
  <text x="572" y="954" class="muted small">/10</text>
  <text x="684" y="954" class="text body">2</text>
  <text x="810" y="954" class="text body">2</text>
  <text x="958" y="954" class="strong body">80%</text>
  <text x="1124" y="954" class="text body">2026-03-20</text>
  <text x="1274" y="954" class="muted small">月初に欠席が多い</text>
  <rect class="btn-secondary" x="1494" y="934" width="78" height="30" />
  <text x="1517" y="954" class="text tiny">並替</text>
  <rect class="btn-secondary" x="1582" y="934" width="78" height="30" />
  <text x="1605" y="954" class="text tiny">詳細</text>

  <text x="88" y="1042" class="muted small">配車タブでは「登録回数 / 運転回数 / 同乗回数 / 現地集合回数 / 最終登録日」に差し替え</text>
  <text x="88" y="1070" class="muted small">集金タブでは「対象回数 / 回収済回数 / 未回収回数 / 未回収額 / 最終集金日」に差し替え</text>

  <rect class="card" x="64" y="1196" width="1668" height="28" />
  <text x="88" y="1215" class="muted tiny">設計意図: メンバー一覧の操作感は維持しつつ、確認したい状況だけをタブで切り替えて画面をすっきり保つ</text>
</svg>
