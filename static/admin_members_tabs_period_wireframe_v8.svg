<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="980" viewBox="0 0 1700 980" role="img" aria-labelledby="title desc">
  <title id="title">メンバー管理画面 現行デザイン踏襲モック v8</title>
  <desc id="desc">現行のメンバー管理画面デザインを維持しつつ、削除ボタン行の下に表示期間、表に接続したタブ、1行見出し、現状に近い行高を反映したモックです。</desc>
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .panel { fill: #121821; stroke: #2f3946; stroke-width: 2; rx: 16; ry: 16; }
      .editor { fill: rgba(255,76,76,0.08); stroke: rgba(255,43,43,0.24); stroke-width: 1.4; rx: 14; ry: 14; }
      .field { fill: rgba(24,24,24,0.56); stroke: rgba(255,255,255,0.20); stroke-width: 1.2; rx: 12; ry: 12; }
      .btn-red { fill: #8f2940; stroke: #b64863; stroke-width: 1.2; rx: 4; ry: 4; }
      .btn-green { fill: #15803d; stroke: #15803d; stroke-width: 1.2; rx: 4; ry: 4; }
      .tab-active { fill: #2f7a4f; stroke: #2f6d44; stroke-width: 1.2; rx: 4; ry: 4; }
      .tab { fill: #1d2630; stroke: #2f3946; stroke-width: 1.2; rx: 4; ry: 4; }
      .th { fill: url(#headGrad); stroke: #2f6d44; stroke-width: 1.1; }
      .td { fill: #11151b; stroke: #2f3946; stroke-width: 1; }
      .td-alt { fill: #1b222c; stroke: #2f3946; stroke-width: 1; }
      .select { fill: #11151b; stroke: #4d5968; stroke-width: 1.2; rx: 6; ry: 6; }
      .status-good { fill: #22c55e; }
      .status-bad { fill: #ef4444; }
      .text { fill: #e5e7eb; font-family: 'Noto Sans JP', 'Yu Gothic', sans-serif; }
      .muted { fill: #9aa4b2; font-family: 'Noto Sans JP', 'Yu Gothic', sans-serif; }
      .strong { fill: #ffffff; font-family: 'Noto Sans JP', 'Yu Gothic', sans-serif; font-weight: 700; }
      .accent { fill: #f2fff6; font-family: 'Noto Sans JP', 'Yu Gothic', sans-serif; font-weight: 700; }
      .title { font-size: 32px; font-weight: 700; }
      .h1 { font-size: 26px; font-weight: 700; }
      .h2 { font-size: 20px; font-weight: 700; }
      .body { font-size: 14px; font-weight: 500; }
      .small { font-size: 12px; font-weight: 500; }
    </style>
    <linearGradient id="headGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#3b8f5f"/>
      <stop offset="100%" stop-color="#2a6d48"/>
    </linearGradient>
  </defs>

  <rect class="bg" x="0" y="0" width="1700" height="980" />

  <text x="42" y="54" class="text title">現行デザイン踏襲モック</text>
  <text x="42" y="88" class="muted body">タブ・期間・列追加のみ。デザイン変更は最小限に抑制</text>

  <text x="44" y="142" class="strong h1">メンバー管理</text>

  <rect class="panel" x="34" y="168" width="1632" height="198" />
  <text x="58" y="210" class="strong h2">メンバー一括登録</text>
  <rect class="editor" x="58" y="228" width="1546" height="92" />
  <text x="78" y="256" class="text body">メンバー名（1行に1名）</text>
  <rect class="field" x="78" y="266" width="1480" height="34" />
  <text x="96" y="288" class="muted body">田中 太郎 / 佐藤 花子 / 鈴木 次郎</text>
  <rect class="btn-red" x="58" y="332" width="108" height="34" />
  <text x="86" y="354" class="strong body">一括登録</text>

  <rect class="panel" x="34" y="392" width="1632" height="542" />

  <!-- row 1: arrows/delete/csv -->
  <text x="58" y="438" class="text body">▲</text>
  <text x="84" y="438" class="text body">▼</text>
  <rect class="btn-red" x="116" y="416" width="74" height="34" />
  <text x="139" y="438" class="strong body">削除</text>
  <rect class="btn-green" x="1528" y="416" width="96" height="34" />
  <text x="1554" y="438" class="strong body">CSV出力</text>

  <!-- row 2: period -->
  <text x="58" y="482" class="text body">表示期間</text>
  <rect class="select" x="132" y="469" width="116" height="24" />
  <text x="164" y="486" class="text body">2026-01</text>
  <text x="262" y="486" class="muted body">～</text>
  <rect class="select" x="290" y="469" width="116" height="24" />
  <text x="322" y="486" class="text body">2026-03</text>

  <!-- tabs attached to table -->
  <rect class="tab" x="58" y="510" width="96" height="34" />
  <text x="106" y="531" class="text body" text-anchor="middle">基本情報</text>
  <rect class="tab" x="154" y="510" width="96" height="34" />
  <text x="202" y="531" class="text body" text-anchor="middle">出欠情報</text>
  <rect class="tab" x="250" y="510" width="96" height="34" />
  <text x="298" y="531" class="text body" text-anchor="middle">配車情報</text>
  <rect class="tab" x="346" y="510" width="96" height="34" />
  <text x="394" y="531" class="text body" text-anchor="middle">集金情報</text>
  <rect class="tab-active" x="442" y="510" width="72" height="34" />
  <text x="478" y="531" class="accent body" text-anchor="middle">すべて</text>

  <!-- table -->
  <rect class="th" x="58" y="544" width="74" height="42" />
  <rect class="th" x="132" y="544" width="238" height="42" />
  <rect class="th" x="370" y="544" width="134" height="42" />
  <rect class="th" x="504" y="544" width="150" height="42" />
  <rect class="th" x="654" y="544" width="150" height="42" />
  <rect class="th" x="804" y="544" width="150" height="42" />
  <rect class="th" x="954" y="544" width="150" height="42" />
  <rect class="th" x="1104" y="544" width="150" height="42" />
  <rect class="th" x="1254" y="544" width="170" height="42" />
  <rect class="th" x="1424" y="544" width="200" height="42" />

  <text x="95" y="570" class="accent body" text-anchor="middle">選択</text>
  <text x="251" y="570" class="accent body" text-anchor="middle">メンバー</text>
  <text x="437" y="570" class="accent body" text-anchor="middle">ステータス</text>
  <text x="579" y="570" class="accent body" text-anchor="middle">参加割合</text>
  <text x="729" y="570" class="accent body" text-anchor="middle">未回答割合</text>
  <text x="879" y="570" class="accent body" text-anchor="middle">運転割合</text>
  <text x="1029" y="570" class="accent body" text-anchor="middle">現地集合割合</text>
  <text x="1179" y="570" class="accent body" text-anchor="middle">未回収額</text>
  <text x="1339" y="570" class="accent body" text-anchor="middle">追加列</text>
  <text x="1524" y="570" class="accent body" text-anchor="middle">備考</text>

  <rect class="td-alt" x="58" y="586" width="74" height="48" />
  <rect class="td-alt" x="132" y="586" width="238" height="48" />
  <rect class="td-alt" x="370" y="586" width="134" height="48" />
  <rect class="td-alt" x="504" y="586" width="150" height="48" />
  <rect class="td-alt" x="654" y="586" width="150" height="48" />
  <rect class="td-alt" x="804" y="586" width="150" height="48" />
  <rect class="td-alt" x="954" y="586" width="150" height="48" />
  <rect class="td-alt" x="1104" y="586" width="150" height="48" />
  <rect class="td-alt" x="1254" y="586" width="170" height="48" />
  <rect class="td-alt" x="1424" y="586" width="200" height="48" />
  <rect class="field" x="86" y="601" width="18" height="18" />
  <text x="156" y="615" class="strong body">田中 太郎</text>
  <circle class="status-good" cx="394" cy="610" r="6" />
  <text x="410" y="615" class="text body">有効</text>
  <text x="579" y="615" class="strong body" text-anchor="middle">80%</text>
  <text x="729" y="615" class="text body" text-anchor="middle">10%</text>
  <text x="879" y="615" class="text body" text-anchor="middle">40%</text>
  <text x="1029" y="615" class="text body" text-anchor="middle">20%</text>
  <text x="1179" y="615" class="strong body" text-anchor="middle">0円</text>
  <text x="1339" y="615" class="muted body" text-anchor="middle">選択タブで切替</text>
  <text x="1524" y="615" class="muted body" text-anchor="middle">左側固定</text>

  <rect class="td" x="58" y="634" width="74" height="48" />
  <rect class="td" x="132" y="634" width="238" height="48" />
  <rect class="td" x="370" y="634" width="134" height="48" />
  <rect class="td" x="504" y="634" width="150" height="48" />
  <rect class="td" x="654" y="634" width="150" height="48" />
  <rect class="td" x="804" y="634" width="150" height="48" />
  <rect class="td" x="954" y="634" width="150" height="48" />
  <rect class="td" x="1104" y="634" width="150" height="48" />
  <rect class="td" x="1254" y="634" width="170" height="48" />
  <rect class="td" x="1424" y="634" width="200" height="48" />
  <rect class="field" x="86" y="649" width="18" height="18" />
  <text x="156" y="663" class="strong body">佐藤 花子</text>
  <circle class="status-bad" cx="394" cy="658" r="6" />
  <text x="410" y="663" class="text body">無効</text>
  <text x="579" y="663" class="strong body" text-anchor="middle">40%</text>
  <text x="729" y="663" class="text body" text-anchor="middle">40%</text>
  <text x="879" y="663" class="text body" text-anchor="middle">0%</text>
  <text x="1029" y="663" class="text body" text-anchor="middle">60%</text>
  <text x="1179" y="663" class="strong body" text-anchor="middle">3,000円</text>
  <text x="1339" y="663" class="muted body" text-anchor="middle">右側のみ差替</text>
  <text x="1524" y="663" class="muted body" text-anchor="middle">要確認</text>

  <rect class="td-alt" x="58" y="682" width="74" height="48" />
  <rect class="td-alt" x="132" y="682" width="238" height="48" />
  <rect class="td-alt" x="370" y="682" width="134" height="48" />
  <rect class="td-alt" x="504" y="682" width="150" height="48" />
  <rect class="td-alt" x="654" y="682" width="150" height="48" />
  <rect class="td-alt" x="804" y="682" width="150" height="48" />
  <rect class="td-alt" x="954" y="682" width="150" height="48" />
  <rect class="td-alt" x="1104" y="682" width="150" height="48" />
  <rect class="td-alt" x="1254" y="682" width="170" height="48" />
  <rect class="td-alt" x="1424" y="682" width="200" height="48" />
  <rect class="field" x="86" y="697" width="18" height="18" />
  <text x="156" y="711" class="strong body">中村 光</text>
  <circle class="status-good" cx="394" cy="706" r="6" />
  <text x="410" y="711" class="text body">有効</text>
  <text x="579" y="711" class="strong body" text-anchor="middle">70%</text>
  <text x="729" y="711" class="text body" text-anchor="middle">20%</text>
  <text x="879" y="711" class="text body" text-anchor="middle">30%</text>
  <text x="1029" y="711" class="text body" text-anchor="middle">30%</text>
  <text x="1179" y="711" class="strong body" text-anchor="middle">0円</text>
  <text x="1339" y="711" class="muted body" text-anchor="middle">CSVは表示中内容</text>
  <text x="1524" y="711" class="muted body" text-anchor="middle">安定</text>
</svg>
