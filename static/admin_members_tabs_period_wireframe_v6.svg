  <rect class="td" x="1104" y="710" width="150" height="74" />
  <rect class="td" x="1254" y="710" width="170" height="74" />
  <rect class="td" x="1424" y="710" width="200" height="74" />
  <rect class="field" x="86" y="738" width="18" height="18" />
  <text x="156" y="742" class="strong body">佐藤 花子</text>
  <circle class="status-bad" cx="394" cy="747" r="6" />
  <text x="410" y="752" class="text body">無効</text>
  <text x="560" y="752" class="strong body">40%</text>
  <text x="710" y="752" class="text body">40%</text>
  <text x="860" y="752" class="text body">0%</text>
  <text x="1016" y="752" class="text body">60%</text>
  <text x="1146" y="752" class="strong body">3,000円</text>
  <text x="1290" y="752" class="muted body">列追加のみで画面構成は維持</text>
  <text x="1450" y="752" class="muted body">要確認</text>

  <!-- row 3 -->
  <rect class="td-alt" x="58" y="784" width="74" height="74" />
  <rect class="td-alt" x="132" y="784" width="238" height="74" />
  <rect class="td-alt" x="370" y="784" width="134" height="74" />
  <rect class="td-alt" x="504" y="784" width="150" height="74" />
  <rect class="td-alt" x="654" y="784" width="150" height="74" />
  <rect class="td-alt" x="804" y="784" width="150" height="74" />
  <rect class="td-alt" x="954" y="784" width="150" height="74" />
  <rect class="td-alt" x="1104" y="784" width="150" height="74" />
  <rect class="td-alt" x="1254" y="784" width="170" height="74" />
  <rect class="td-alt" x="1424" y="784" width="200" height="74" />
  <rect class="field" x="86" y="812" width="18" height="18" />
  <text x="156" y="816" class="strong body">中村 光</text>
  <circle class="status-good" cx="394" cy="821" r="6" />
  <text x="410" y="826" class="text body">有効</text>
  <text x="560" y="826" class="strong body">70%</text>
  <text x="710" y="826" class="text body">20%</text>
  <text x="860" y="826" class="text body">30%</text>
  <text x="1016" y="826" class="text body">30%</text>
  <text x="1158" y="826" class="strong body">0円</text>
  <text x="1288" y="826" class="muted body">CSVは表示中タブ内容を出力</text>
  <text x="1450" y="826" class="muted body">安定</text>

  <rect class="guide" x="58" y="888" width="1566" height="214" />
  <text x="76" y="920" class="strong body">タブごとの追加列</text>
  <text x="76" y="954" class="text body">基本情報: 追加列なし</text>
  <text x="76" y="986" class="text body">出欠情報: 参加回数 / 参加割合 / 不参加回数 / 不参加割合 / 未回答回数 / 未回答割合</text>
  <text x="76" y="1018" class="text body">配車情報: 運転回数 / 運転割合 / 乗車回数 / 乗車割合 / 現地集合回数 / 現地集合割合</text>
  <text x="76" y="1050" class="text body">集金情報: 集金額合計 / 回収回数 / 未回収回数 / 未回収額</text>
  <text x="76" y="1082" class="text body">すべて: 参加割合 / 未回答割合 / 運転割合 / 現地集合割合 / 未回収額</text>
</svg>
