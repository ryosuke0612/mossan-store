  <rect class="tab" x="346" y="512" width="96" height="34" />
  <text x="371" y="534" class="text body">集金情報</text>
  <rect class="tab-active" x="442" y="512" width="72" height="34" />
  <text x="467" y="534" class="accent body">すべて</text>

