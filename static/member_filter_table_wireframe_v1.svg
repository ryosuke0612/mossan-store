<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1900" viewBox="0 0 1440 1900" role="img" aria-labelledby="title desc">
  <title id="title">フィルター付きメンバー一覧表 初版ワイヤー</title>
  <desc id="desc">管理者がメンバー情報をフィルターしながら一覧で確認できる画面の初版ワイヤーです。</desc>
  <defs>
    <style>
      .bg { fill: #f4efe6; }
      .nav { fill: #17362e; }
      .panel { fill: #fffdf8; stroke: #26463b; stroke-width: 2; rx: 22; ry: 22; }
      .soft { fill: #edf3ec; stroke: #698275; stroke-width: 1.5; rx: 16; ry: 16; }
      .tag { fill: #dde9dc; stroke: #26463b; stroke-width: 1.2; rx: 999; ry: 999; }
      .active-tag { fill: #26463b; stroke: #26463b; stroke-width: 1.2; rx: 999; ry: 999; }
      .alert { fill: #fff1de; stroke: #bd7a35; stroke-width: 1.5; rx: 16; ry: 16; }
      .danger { fill: #fbe6df; stroke: #b14b3f; stroke-width: 1.5; rx: 16; ry: 16; }
      .text { fill: #17332b; font-family: 'Yu Gothic', 'Hiragino Sans', sans-serif; }
      .muted { fill: #5a6a61; font-family: 'Yu Gothic', 'Hiragino Sans', sans-serif; }
      .title { font-size: 34px; font-weight: 700; }
      .h1 { font-size: 28px; font-weight: 700; }
      .h2 { font-size: 22px; font-weight: 700; }
      .body { font-size: 16px; font-weight: 500; }
      .small { font-size: 14px; font-weight: 500; }
      .num { font-size: 26px; font-weight: 800; }
      .good { fill: #2b6b50; }
      .warn { fill: #97551e; }
      .bad { fill: #a33c34; }
      .line { stroke: #d6ddd6; stroke-width: 1; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1440" height="1900" />

  <rect class="nav" x="0" y="0" width="1440" height="88" />
  <text x="72" y="56" class="title" fill="#f7f3ea">メンバー分析一覧</text>
  <text x="1170" y="54" class="body" fill="#dfe8e1">対象: FC Sample</text>

  <text x="72" y="154" class="h1 text">1. まずは絞り込む</text>
  <text x="72" y="186" class="body muted">実務でよく使う条件を上部にまとめ、検索してすぐ対象者を絞れる形にします。</text>

