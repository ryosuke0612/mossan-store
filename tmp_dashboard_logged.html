    -16px -1px 0 rgba(74, 168, 92, 0.74),
    -23px 0 0 rgba(108, 200, 111, 0.78),
    -31px -2px 0 rgba(86, 176, 94, 0.8),
    -40px 1px 0 rgba(72, 160, 80, 0.74),

    -184px 2px 0 rgba(116, 208, 117, 0.78),

    -208px 1px 0 rgba(98, 192, 104, 0.77),
    -220px -1px 0 rgba(70, 158, 80, 0.72);

.logo-text.attendance-brand.brand-v3 {
  display: inline-flex;
  align-items: center;
}

}
.logo-text.attendance-brand.brand-v3 .wild-chip::before,
.logo-text.attendance-brand.brand-v3 .wild-chip::after {

  height: 6px;

  background: rgba(22, 24, 27, 0.8);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2);
}
.logo-text.attendance-brand.brand-v3 .wild-chip::before { left: 8px; }
.logo-text.attendance-brand.brand-v3 .wild-chip::after { right: 8px; }
.logo-variant-switch {
  display: flex;
  gap: 6px;
  margin-left: 8px;
}
.logo-variant-btn {
  width: auto;
  border-radius: 999px;
  border: 1px solid #3e3e3e;
  background: #111;
  color: #ddd;
  padding: 5px 10px;
  font-size: 12px;
  font-weight: 700;
  line-height: 1;
  cursor: pointer;
}
.logo-variant-btn.active {
  border-color: #ff4b4b;
  background: #3d0d0d;
  color: #fff;
}
.top-nav {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  align-items: center;
}
.top-nav a {
  text-decoration: none;
  font-weight: 700;
  color: var(--text);
  border-bottom: 2px solid transparent;
  padding-bottom: 2px;
}
.top-nav a:hover { color: #ff8a8a; border-bottom-color: #ff8a8a; }
.home-header .top-nav a {
  color: #c6d6ed;
}
.home-header .top-nav a:hover {
  color: #7dd3fc;
  border-bottom-color: rgba(125, 211, 252, 0.85);
}
.menu-toggle {
  display: none;
  width: 46px;
  height: 40px;
  padding: 0;
  border: 1px solid rgba(177, 43, 75, 0.58);
  border-radius: 10px;
  background: linear-gradient(180deg, rgba(177, 43, 75, 0.22) 0%, rgba(123, 30, 53, 0.18) 100%);

  align-items: center;
  justify-content: center;
  gap: 4px;
  flex-direction: column;

  transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
}
.menu-toggle:hover {
  filter: brightness(1.04);
}
.home-header .menu-toggle {
  border-color: rgba(125, 211, 252, 0.22);
  background: linear-gradient(180deg, rgba(56, 105, 168, 0.18) 0%, rgba(17, 27, 47, 0.28) 100%);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06), 0 4px 10px rgba(0, 0, 0, 0.16);
}
.home-header .menu-toggle span {
  background: #e7f3ff;
}
.menu-toggle span {
  width: 18px;
  height: 2px;
  border-radius: 999px;
  background: #ffe7ec;
  box-shadow: 0 1px 0 rgba(0, 0, 0, 0.35);
  transition: transform 0.22s ease, opacity 0.18s ease;
}
.menu-toggle[aria-expanded="true"] span:nth-child(1) {
  transform: translateY(6px) rotate(45deg);
}
.menu-toggle[aria-expanded="true"] span:nth-child(2) {
  opacity: 0;
}
.menu-toggle[aria-expanded="true"] span:nth-child(3) {
  transform: translateY(-6px) rotate(-45deg);
}
.user-chip {
  color: var(--muted);
  font-size: 14px;
  margin-right: 6px;
}
.page-wrap {
  width: min(1120px, 92%);
  margin: 34px auto 70px;
}
.page-wrap.marketing-page-wrap {
  flex: 1 0 auto;
}
.page-title {
  font-family: 'Anton', sans-serif;
  letter-spacing: 1px;
  font-size: clamp(30px, 5vw, 48px);
  margin: 0 0 20px;
}
.panel {
  background: linear-gradient(180deg, #1a1a1a 0%, #131313 100%);
  border: 1px solid var(--line-soft);
  border-radius: 14px;
  padding: 18px;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
}
.panel + .panel { margin-top: 16px; }
.grid-2 {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 16px;
}
.grid-3 {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 16px;
}
.field { margin-bottom: 14px; }
label {
  display: block;
  margin-bottom: 6px;
  font-size: 14px;
  color: var(--muted);
}
input, select, button {
  width: 100%;
  border-radius: 10px;
  border: 1px solid #2d2d2d;
  background: #0d0d0d;
  color: var(--text);
  padding: 10px 12px;
  font-size: 15px;
}
input:focus, select:focus {
  outline: none;
  border-color: #ff7878;
  box-shadow: 0 0 0 2px rgba(255, 43, 43, 0.25);
}
.btn-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.btn {
  width: auto;
  display: inline-block;
  text-decoration: none;
  border: 1px solid #ff4b4b;
  background: #ff2b2b;
  color: white;
  font-weight: 700;
  padding: 10px 16px;
  border-radius: 999px;
  cursor: pointer;
}
.btn:hover { background: #ff5353; }
.btn.secondary { background: transparent; border-color: #666; }
.btn.secondary:hover { border-color: #999; }
.btn.warning { background: #c77900; border-color: #c77900; }
.btn.danger { background: #a22626; border-color: #a22626; }
.notice {
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid;
  margin-bottom: 12px;
}
.notice.error { background: rgba(180, 35, 35, 0.2); border-color: #c53f3f; }
.notice.success { background: rgba(41, 146, 73, 0.2); border-color: #2f9a50; }
.table-wrap { overflow-x: auto; }
table {
  width: 100%;
  border-collapse: collapse;
  min-width: 760px;
}
th, td {
  border: 1px solid #2f2f2f;
  padding: 8px;
  font-size: 14px;
  vertical-align: middle;
  text-align: center;
}
th { background: #1b1b1b; color: #ffcbcb; }
.site-footer {
  position: fixed;
  left: 0;
  bottom: 0;
  width: 100%;
  z-index: 20;
  border-top: 3px solid var(--line);
  background: #000;
  text-align: center;
  color: #bdbdbd;
  padding: 22px;
  font-size: 13px;
}
.site-footer.home-footer {
  position: static;
  border-top: 1px solid rgba(125, 211, 252, 0.12);
  background: rgba(4, 9, 17, 0.94);
  color: #90a5c3;
  padding: 26px 22px 34px;
}
@media (max-width: 900px) {
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
  .header-inner {
    align-items: center;
  }
  .logo-text {
    font-size: 22px;
    letter-spacing: 1px;
  }
  .logo-text.attendance-brand.brand-v2 {
    font-size: 28px;
  }
  .logo-text.attendance-brand.brand-v3 .wild-chip {
    font-size: 18px;
    min-height: 34px;
    padding: 4px 20px;
  }
  .logo-variant-switch {
    margin-left: 0;
  }
  .menu-toggle {
    display: inline-flex;
    position: absolute;
    top: 50%;
    right: 0;
    transform: translateY(-50%);
  }
  .top-nav {
    display: none;
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    width: min(260px, 86vw);
    padding: 12px;
    background: #0d0d0d;
    border: 1px solid #333;
    border-radius: 12px;
    box-shadow: 0 12px 28px rgba(0, 0, 0, 0.45);
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
    opacity: 0;
    transform: translateY(-6px);
    transition: opacity 0.18s ease, transform 0.18s ease;
  }
  .top-nav.open {
    display: flex;
    opacity: 1;
    transform: translateY(0);
  }
  .home-header .top-nav {
    background: rgba(8, 14, 25, 0.96);
    border-color: rgba(125, 211, 252, 0.16);
  }
  .top-nav a {
    width: 100%;
    border-bottom: none;
    padding: 6px 2px;
  }
  body { padding-top: 88px; padding-bottom: 68px; }
}
</style>

<script>
(() => {
  const toggle = document.querySelector('.menu-toggle');
  const nav = document.getElementById('top-nav');
  if (!toggle || !nav) return;

  const closeNav = () => {
    nav.classList.remove('open');
    toggle.setAttribute('aria-expanded', 'false');
  };

  toggle.addEventListener('click', () => {
    const isOpen = nav.classList.toggle('open');
    toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
  });

  document.addEventListener('click', (event) => {
    if (!nav.classList.contains('open')) return;
    if (nav.contains(event.target) || toggle.contains(event.target)) return;
    closeNav();
  });

  nav.querySelectorAll('a').forEach((link) => {
    link.addEventListener('click', closeNav);
  });

  window.addEventListener('resize', () => {
    if (window.innerWidth > 900) closeNav();
  });

})();
</script>

<script>
async function copyMemberUrl(urlText) {
  if (navigator.clipboard && window.isSecureContext) {
    await navigator.clipboard.writeText(urlText);
    return;
  }
  const textArea = document.createElement("textarea");
  textArea.value = urlText;
  textArea.style.position = "fixed";
  textArea.style.left = "-9999px";
  document.body.appendChild(textArea);
  textArea.focus();
  textArea.select();
  const copied = document.execCommand("copy");
  document.body.removeChild(textArea);
  if (!copied) {
    throw new Error("copy_failed");
  }
}

document.querySelectorAll("[data-copy-url]").forEach((button) => {
  let resetTimerId = null;

  button.addEventListener("click", async () => {
    const wrap = button.parentElement;
    const feedback = wrap ? wrap.querySelector(".copy-feedback") : null;
    const relativeUrl = button.getAttribute("data-copy-url");
    const absoluteUrl = new URL(relativeUrl, window.location.origin).toString();

    if (resetTimerId) {
      clearTimeout(resetTimerId);
      resetTimerId = null;
    }

    try {
      await copyMemberUrl(absoluteUrl);
      if (feedback) {
        feedback.textContent = "";
        feedback.setAttribute("aria-label", "コピーしました");
        feedback.classList.add("is-visible");
      }
      if (wrap) {
        wrap.classList.add("is-copy-complete");
      }
    } catch (error) {
      if (feedback) {
        feedback.textContent = "";
        feedback.setAttribute("aria-label", "コピー失敗");
        feedback.classList.add("is-visible");
      }
    }

    resetTimerId = window.setTimeout(() => {
      if (feedback) {
        feedback.classList.remove("is-visible");
        feedback.textContent = "";
        feedback.removeAttribute("aria-label");
      }
      if (wrap) {
        wrap.classList.remove("is-copy-complete");
      }
      resetTimerId = null;
    }, 1400);
  });
});
</script>
